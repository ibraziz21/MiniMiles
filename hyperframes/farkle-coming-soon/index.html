<!doctype html>
<html lang="en" data-resolution="landscape">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
        font-family: Inter, "Helvetica Neue", Arial, sans-serif;
      }

      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
      }

      .scene {
        position: absolute;
        inset: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }

      .scene-content {
        position: relative;
        z-index: 3;
        width: 100%;
        height: 100%;
        padding: 120px 160px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
      }

      #intro {
        background:
          radial-gradient(circle at 18% 78%, rgba(12, 119, 108, 0.28), transparent 34%),
          radial-gradient(circle at 76% 18%, rgba(35, 141, 157, 0.18), transparent 36%),
          linear-gradient(138deg, #04111f 0%, #062236 44%, #063a41 75%, #0a6c66 100%);
      }

      #intro::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(0deg, rgba(255, 255, 255, 0.026) 1px, transparent 1px);
        background-size: 96px 96px;
        mask-image: radial-gradient(circle at 50% 50%, black 0%, transparent 68%);
        opacity: 0.48;
      }

      #intro::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(115deg, transparent 0%, rgba(255, 255, 255, 0.05) 47%, transparent 60%),
          radial-gradient(circle at 50% 50%, transparent 0%, rgba(0, 0, 0, 0.45) 86%);
        opacity: 0.9;
      }

      .logo-stack {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 30px;
        transform: translateY(-4px);
      }

      .logo-icon-shell {
        width: 220px;
        height: 220px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 35% 30%, rgba(105, 194, 206, 0.44), transparent 32%),
          linear-gradient(150deg, #238d9d 0%, #0f766f 100%);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.16),
          0 24px 72px rgba(0, 0, 0, 0.32),
          0 0 86px rgba(35, 141, 157, 0.34);
        opacity: 0;
        will-change: opacity, transform;
      }

      .logo-icon-shell::before,
      .logo-icon-shell::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
      }

      .logo-icon-shell::before {
        width: 286px;
        height: 286px;
        border: 1px solid rgba(255, 255, 255, 0.13);
      }

      .logo-icon-shell::after {
        width: 352px;
        height: 352px;
        border: 1px solid rgba(105, 194, 206, 0.1);
      }

      .logo-icon-shell img {
        width: 132px;
        height: 132px;
        filter: drop-shadow(0 10px 22px rgba(0, 0, 0, 0.18));
        will-change: transform;
      }

      .wordmark {
        color: rgba(247, 253, 253, 0.96);
        font-size: 72px;
        font-weight: 800;
        line-height: 1;
        letter-spacing: 0;
        opacity: 0;
        text-shadow: 0 16px 42px rgba(0, 0, 0, 0.36);
        will-change: opacity, transform;
      }

      .black-overlay {
        position: absolute;
        inset: 0;
        width: 1920px;
        height: 1080px;
        background: #000;
        opacity: 0;
        z-index: 10;
      }

      #outro {
        background: #000;
      }

      #outro .scene-content {
        gap: 34px;
        padding: 120px 180px;
      }

      .title-lockup {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 330px;
      }

      #farkle {
        color: #f8ffff;
        font-family: "Arial Black", Montserrat, Inter, Arial, sans-serif;
        font-size: 178px;
        font-weight: 900;
        line-height: 0.94;
        letter-spacing: 0;
        text-align: center;
        opacity: 0;
        text-shadow: 0 22px 70px rgba(255, 255, 255, 0.08);
        will-change: opacity, transform;
      }

      #coming-soon {
        color: rgba(248, 255, 255, 0.88);
        font-size: 42px;
        font-weight: 500;
        line-height: 1.15;
        letter-spacing: 0;
        text-align: center;
        opacity: 0;
        will-change: opacity, transform;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="10"
      data-width="1920"
      data-height="1080"
    >
      <section id="intro" class="scene clip" data-start="0" data-duration="4.5" data-track-index="1">
        <div class="scene-content">
          <div class="logo-stack" aria-label="AkibaMiles logo reveal">
            <div id="logo-icon-shell" class="logo-icon-shell">
              <img id="logo-icon" src="assets/akibamiles-symbol.svg" alt="AkibaMiles" />
            </div>
            <div id="wordmark" class="wordmark">AkibaMiles</div>
          </div>
        </div>
      </section>

      <div id="black-frame" class="black-overlay clip" data-start="4" data-duration="1" data-track-index="3"></div>

      <section id="outro" class="scene clip" data-start="5" data-duration="5" data-track-index="1">
        <div class="scene-content">
          <div class="title-lockup">
            <h1 id="farkle">FARKLE</h1>
            <p id="coming-soon">coming soon</p>
          </div>
        </div>
      </section>

      <div id="final-black" class="black-overlay clip" data-start="9.35" data-duration="0.65" data-track-index="4"></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};

      const tl = gsap.timeline({
        paused: true,
        defaults: { ease: "power3.out" },
      });

      tl.fromTo(
        "#logo-icon-shell",
        { opacity: 0, scale: 0 },
        { opacity: 1, scale: 1, duration: 0.58, ease: "back.out(1.45)" },
        0.12,
      );
      tl.fromTo(
        "#logo-icon",
        { scale: 0.86, rotation: -8 },
        { scale: 1, rotation: 0, duration: 0.62, ease: "power3.out" },
        0.12,
      );
      tl.to("#logo-icon-shell", { scale: 1.025, duration: 0.14, ease: "power2.out" }, 0.72);
      tl.to("#logo-icon-shell", { scale: 1, duration: 0.2, ease: "power2.inOut" }, 0.86);

      tl.fromTo(
        "#wordmark",
        { opacity: 0, y: 18 },
        { opacity: 1, y: 0, duration: 0.5, ease: "sine.out" },
        1.5,
      );

      tl.fromTo(
        "#black-frame",
        { opacity: 0 },
        { opacity: 1, duration: 0.5, ease: "sine.inOut", immediateRender: false },
        4,
      );

      tl.fromTo(
        "#farkle",
        { opacity: 0, scale: 0.78, y: 12 },
        { opacity: 1, scale: 1.07, y: 0, duration: 0.2, ease: "back.out(2.2)", immediateRender: false },
        5.04,
      );
      tl.to("#farkle", { scale: 1, duration: 0.16, ease: "power3.out" }, 5.24);

      tl.fromTo(
        "#coming-soon",
        { opacity: 0, y: 14 },
        { opacity: 1, y: 0, duration: 0.55, ease: "sine.out", immediateRender: false },
        6.86,
      );

      tl.fromTo(
        "#final-black",
        { opacity: 0 },
        { opacity: 1, duration: 0.65, ease: "sine.inOut", immediateRender: false },
        9.35,
      );

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
